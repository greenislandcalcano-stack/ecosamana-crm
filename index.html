<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>EcoSamana CRM</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <div class="crm-shell">

    <aside class="crm-sidebar">
      <div class="crm-brand">
        <h2>EcoSamana</h2>
        <span>Operations CRM</span>
      </div>

      <nav class="crm-nav">
        <a href="#" class="active" data-page="dashboard">
          <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="#" data-page="reservations">
          <i class="bi bi-calendar-check"></i> Reservations
        </a>

        <a href="#" data-page="customers">
          <i class="bi bi-people"></i> Customers
        </a>

        <a href="#" data-page="payments">
          <i class="bi bi-credit-card"></i> Payments
        </a>

        <a href="#" data-page="tours">
          <i class="bi bi-map"></i> Tours
        </a>

        <a href="#" data-page="reports">
          <i class="bi bi-bar-chart"></i> Reports
        </a>

        <a href="#" data-page="settings">
          <i class="bi bi-gear"></i> Settings
        </a>
      </nav>
    </aside>

    <main class="crm-main">

      <header class="crm-header">
        <div>
          <h1 id="page-title">Dashboard</h1>
          <p>EcoSamana Adventures Operations Center</p>
        </div>

        <button class="btn btn-success">
          <i class="bi bi-plus-circle"></i> New Reservation
        </button>
      </header>

      <section id="app-content"></section>

    </main>

  </div>

  <script src="assets/js/app.js"></script>

</body>
</html>
