<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EcoSamana CRM</title>

    <meta name="description" content="EcoSamana Adventures CRM">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Main CSS -->
   <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">

        <div class="logo">

            <h2>EcoSamana CRM</h2>

            <small>Operations Center</small>

        </div>

        <nav>

            <ul>

                <li><a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a></li>

                <li><a href="#"><i class="bi bi-calendar-check"></i> Reservations</a></li>

                <li><a href="#"><i class="bi bi-people"></i> Customers</a></li>

                <li><a href="#"><i class="bi bi-credit-card"></i> Payments</a></li>

                <li><a href="#"><i class="bi bi-map"></i> Tours</a></li>

                <li><a href="#"><i class="bi bi-star"></i> Reviews</a></li>

                <li><a href="#"><i class="bi bi-bar-chart"></i> Reports</a></li>

                <li><a href="#"><i class="bi bi-gear"></i> Settings</a></li>

            </ul>

        </nav>

    </aside>

    <!-- Main Area -->

    <main id="main-content">

        <header>

            <div>

                <h1>Dashboard</h1>

                <p>Welcome to EcoSamana CRM</p>

            </div>

            <div>

                <button class="btn btn-success">

                    <i class="bi bi-plus-circle"></i>

                    New Reservation

                </button>

            </div>

        </header>

        <section id="workspace">

            <div class="alert alert-success">

                <h4>Welcome, Captain!</h4>

                <p>

                    EcoSamana CRM is successfully running.

                    This dashboard will become the heart of your operations.

                </p>

            </div>

        </section>

    </main>

</div>

<script src="assets/js/app.js"></script>

</body>

</html>
