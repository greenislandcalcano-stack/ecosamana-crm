
<div class="row mb-3">
  <div class="col-md-6">
    <input
      type="text"
      id="customerSearch"
      class="form-control"
      placeholder="Search by customer, phone, email, country or hotel..."
    >
  </div>
</div>

<div class="crm-card">

  <div class="d-flex justify-content-between align-items-center mb-4">

    <div>
      <h3 class="fw-bold mb-1">Customers</h3>
      <p class="text-muted mb-0">
        Manage your EcoSamana customer database.
      </p>
    </div>

    <button
      class="btn btn-success"
      data-bs-toggle="modal"
      data-bs-target="#customerModal">

      <i class="bi bi-plus-circle"></i>
      Add Customer

    </button>

  </div>

  <table class="table">

    <thead>

      <tr>
        <th>Customer</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Country</th>
        <th>Hotel</th>
        <th>Actions</th>
      </tr>

    </thead>

    <tbody id="customersTableBody">

    </tbody>

  </table>

</div>



<!-- ===========================
     CUSTOMER MODAL
=========================== -->

<div class="modal fade"
     id="customerModal"
     tabindex="-1">

  <div class="modal-dialog modal-lg modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title fw-bold">
          Customer
        </h5>

        <button
          class="btn-close"
          data-bs-dismiss="modal">
        </button>

      </div>

      <form id="customerForm">

        <div class="modal-body">

          <div class="row g-3">

            <div class="col-md-6">

              <label class="form-label">
                Customer Name
              </label>

              <input
                id="customerName"
                class="form-control"
                required>

            </div>

            <div class="col-md-6">

              <label class="form-label">
                Phone / WhatsApp
              </label>

              <input
                id="customerPhone"
                class="form-control">

            </div>

            <div class="col-md-6">

              <label class="form-label">
                Email
              </label>

              <input
                type="email"
                id="customerEmail"
                class="form-control">

            </div>

            <div class="col-md-6">

              <label class="form-label">
                Country
              </label>

              <input
                id="customerCountry"
                class="form-control">

            </div>

            <div class="col-md-12">

              <label class="form-label">
                Hotel
              </label>

              <input
                id="customerHotel"
                class="form-control">

            </div>

            <div class="col-12">

              <label class="form-label">
                Notes
              </label>

              <textarea
                id="customerNotes"
                rows="3"
                class="form-control"></textarea>

            </div>

          </div>

        </div>

        <div class="modal-footer">

          <button
            type="button"
            class="btn btn-light"
            data-bs-dismiss="modal">

            Cancel

          </button>

          <button
            type="submit"
            class="btn btn-success">

            <i class="bi bi-save"></i>
            Save Customer

          </button>

        </div>

      </form>

    </div>

  </div>

</div>



<!-- ===========================
     VIEW CUSTOMER
=========================== -->

<div class="modal fade"
     id="viewCustomerModal"
     tabindex="-1">

  <div class="modal-dialog modal-lg modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5
          class="modal-title"
          id="viewCustomerTitle">

          Customer Details

        </h5>

        <button
          class="btn-close"
          data-bs-dismiss="modal">
        </button>

      </div>

      <div
        class="modal-body"
        id="viewCustomerBody">

      </div>

      <div class="modal-footer">

        <button
          class="btn btn-secondary"
          data-bs-dismiss="modal">

          Close

        </button>

      </div>

    </div>

  </div>

</div>
