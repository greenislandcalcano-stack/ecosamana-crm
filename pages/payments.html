
<div class="row mb-3">
  <div class="col-md-6">
    <input
      type="text"
      id="paymentSearch"
      class="form-control"
      placeholder="Search by booking, client or payment method..."
    >
  </div>
</div>

<div class="crm-card">

  <div class="d-flex justify-content-between align-items-center mb-4">

    <div>
      <h3 class="fw-bold mb-1">Payments</h3>
      <p class="text-muted mb-0">
        Record and manage customer payments.
      </p>
    </div>

    <button
      class="btn btn-success"
      data-bs-toggle="modal"
      data-bs-target="#paymentModal">

      <i class="bi bi-plus-circle"></i>
      Add Payment

    </button>

  </div>

  <table class="table">

    <thead>

      <tr>
        <th>Receipt</th>
        <th>Booking</th>
        <th>Client</th>
        <th>Amount</th>
        <th>Method</th>
        <th>Date</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>

    </thead>

    <tbody id="paymentsTableBody">

    </tbody>

  </table>

</div>



<!-- ===========================
     PAYMENT MODAL
=========================== -->

<div class="modal fade"
     id="paymentModal"
     tabindex="-1">

  <div class="modal-dialog modal-lg modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title fw-bold">
          New Payment
        </h5>

        <button
          class="btn-close"
          data-bs-dismiss="modal">
        </button>

      </div>

      <form id="paymentForm">

        <div class="modal-body">

          <div class="row g-3">

            <div class="col-md-4">

              <label class="form-label">
                Booking #
              </label>

              <input
                id="paymentBooking"
                class="form-control"
                required>

            </div>

            <div class="col-md-8">

              <label class="form-label">
                Client
              </label>

              <input
                id="paymentClient"
                class="form-control"
                required>

            </div>

            <div class="col-md-4">

              <label class="form-label">
                Amount
              </label>

              <input
                type="number"
                id="paymentAmount"
                class="form-control"
                value="0">

            </div>

            <div class="col-md-4">

              <label class="form-label">
                Method
              </label>

              <select
                id="paymentMethod"
                class="form-select">

                <option>Cash</option>
                <option>Credit Card</option>
                <option>Debit Card</option>
                <option>Bank Transfer</option>
                <option>PayPal</option>
                <option>Stripe</option>
                <option>Other</option>

              </select>

            </div>

            <div class="col-md-4">

              <label class="form-label">
                Date
              </label>

              <input
                type="date"
                id="paymentDate"
                class="form-control">

            </div>

            <div class="col-md-6">

              <label class="form-label">
                Status
              </label>

              <select
                id="paymentStatus"
                class="form-select">

                <option>Paid</option>
                <option>Pending</option>
                <option>Refunded</option>

              </select>

            </div>

            <div class="col-12">

              <label class="form-label">
                Notes
              </label>

              <textarea
                id="paymentNotes"
                rows="3"
                class="form-control"></textarea>

            </div>

          </div>

        </div>

        <div class="modal-footer">

          <button
            type="button"
            class="btn btn-light"
            data-bs-dismiss="modal">

            Cancel

          </button>

          <button
            type="submit"
            class="btn btn-success">

            <i class="bi bi-save"></i>
            Save Payment

          </button>

        </div>

      </form>

    </div>

  </div>

</div>



<!-- ===========================
     VIEW PAYMENT
=========================== -->

<div class="modal fade"
     id="viewPaymentModal"
     tabindex="-1">

  <div class="modal-dialog modal-lg modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5
          class="modal-title"
          id="viewPaymentTitle">

          Payment Details

        </h5>

        <button
          class="btn-close"
          data-bs-dismiss="modal">
        </button>

      </div>

      <div
        class="modal-body"
        id="viewPaymentBody">

      </div>

      <div class="modal-footer">

        <button
          class="btn btn-secondary"
          data-bs-dismiss="modal">

          Close

        </button>

      </div>

    </div>

  </div>

</div>
