<div class="row mb-3">
  <div class="col-md-6">
    <input
      type="text"
      id="reservationSearch"
      class="form-control"
      placeholder="Search by client, booking, tour, phone, or hotel..."
    >
  </div>
</div>

<div class="crm-card">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-1">Reservations</h3>
      <p class="text-muted mb-0">
        Manage EcoSamana bookings and guest details.
      </p>
    </div>

    <button class="btn btn-success"
            data-bs-toggle="modal"
            data-bs-target="#reservationModal">
      <i class="bi bi-plus-circle"></i>
      Add Reservation
    </button>
  </div>

  <table class="table" id="reservationTable">

    <thead>
      <tr>
        <th>Booking #</th>
        <th>Client</th>
        <th>Tour</th>
        <th>Date</th>
        <th>Guests</th>
        <th>Total</th>
        <th>Deposit</th>
        <th>Balance</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="reservationsTableBody">

    </tbody>

  </table>

</div>





<!-- ===========================
     NEW / EDIT RESERVATION
=========================== -->

<div class="modal fade"
     id="reservationModal"
     tabindex="-1"
     aria-hidden="true">

  <div class="modal-dialog modal-xl modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title fw-bold">
          New Reservation
        </h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal">
        </button>

      </div>

      <form id="reservationForm">

        <div class="modal-body">

          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label">Client Name</label>
              <input type="text"
                     class="form-control"
                     id="clientName"
                     required>
            </div>

            <div class="col-md-3">
              <label class="form-label">Tour Date</label>
              <input type="date"
                     class="form-control"
                     id="tourDate"
                     required>
            </div>

            <div class="col-md-3">
              <label class="form-label">Tour</label>

              <select class="form-select"
                      id="tourName"
                      required>

                <option value="">Select Tour</option>
                <option>Whale Watching</option>
                <option>Los Haitises</option>
                <option>El Limón</option>
                <option>Cayo Levantado</option>
                <option>Snorkeling</option>
                <option>Buggies</option>
                <option>Custom Tour</option>

              </select>

            </div>

            <div class="col-md-3">
              <label class="form-label">Adults</label>
              <input type="number"
                     class="form-control"
                     id="adults"
                     value="1">
            </div>

            <div class="col-md-3">
              <label class="form-label">Children</label>
              <input type="number"
                     class="form-control"
                     id="children"
                     value="0">
            </div>

            <div class="col-md-3">
              <label class="form-label">Total</label>
              <input type="number"
                     class="form-control"
                     id="total"
                     value="0">
            </div>

            <div class="col-md-3">
              <label class="form-label">Deposit</label>
              <input type="number"
                     class="form-control"
                     id="deposit"
                     value="0">
            </div>

            <div class="col-md-6">
              <label class="form-label">
                Hotel / Pickup Location
              </label>

              <input type="text"
                     class="form-control"
                     id="hotel">
            </div>

            <div class="col-md-3">
              <label class="form-label">
                Phone / WhatsApp
              </label>

              <input type="text"
                     class="form-control"
                     id="phone">
            </div>

            <div class="col-md-3">

              <label class="form-label">
                Status
              </label>

              <select class="form-select"
                      id="status">

                <option>Deposit</option>
                <option>Confirmed</option>
                <option>Paid</option>
                <option>Pending</option>
                <option>Cancelled</option>

              </select>

            </div>

            <div class="col-12">

              <label class="form-label">
                Notes
              </label>

              <textarea
                class="form-control"
                id="notes"
                rows="3"></textarea>

            </div>

          </div>

        </div>

        <div class="modal-footer">

          <button
            type="button"
            class="btn btn-light"
            data-bs-dismiss="modal">

            Cancel

          </button>

          <button
            type="submit"
            class="btn btn-success">

            <i class="bi bi-save"></i>
            Save Reservation

          </button>

        </div>

      </form>

    </div>

  </div>

</div>





<!-- ===========================
     VIEW RESERVATION
=========================== -->

<div class="modal fade"
     id="viewReservationModal"
     tabindex="-1">

    <div class="modal-dialog modal-lg modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5
                    class="modal-title"
                    id="viewBookingTitle">

                    Reservation Details

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div
                class="modal-body"
                id="viewReservationBody">

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Close

                </button>

            </div>

        </div>

    </div>

</div>
