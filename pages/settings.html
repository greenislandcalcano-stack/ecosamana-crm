<div class="crm-card">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-1">Settings</h3>
      <p class="text-muted mb-0">Manage EcoSamana company information and CRM preferences.</p>
    </div>
  </div>

  <form id="settingsForm">
    <h5 class="fw-bold mb-3">Company Information</h5>

    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Company Name</label>
        <input type="text" id="companyName" class="form-control" value="EcoSamana Adventures">
      </div>

      <div class="col-md-6">
        <label class="form-label">RNC / Tax ID</label>
        <input type="text" id="companyRnc" class="form-control" placeholder="Enter RNC">
      </div>

      <div class="col-md-6">
        <label class="form-label">WhatsApp</label>
        <input type="text" id="companyWhatsapp" class="form-control" value="+1 504-657-2553">
      </div>

      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input type="text" id="companyPhone" class="form-control" value="+1 504-657-2553">
      </div>

      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" id="companyEmail" class="form-control" value="info@eco-samana.com">
      </div>

      <div class="col-md-6">
        <label class="form-label">Website</label>
        <input type="text" id="companyWebsite" class="form-control" value="eco-samana.com">
      </div>

      <div class="col-md-12">
        <label class="form-label">Address</label>
        <input
          type="text"
          id="companyAddress"
          class="form-control"
          value="Plaza & Hotel, Carretera Sánchez–Samaná Km 1, Unit 3, Sánchez 32000, Dominican Republic"
        >
      </div>

      <div class="col-md-6">
        <label class="form-label">Currency</label>
        <select id="companyCurrency" class="form-select">
          <option value="USD" selected>USD - US Dollar</option>
          <option value="DOP">DOP - Dominican Peso</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Default Deposit %</label>
        <input type="number" id="defaultDeposit" class="form-control" value="20">
      </div>
    </div>

    <hr class="my-4">

    <h5 class="fw-bold mb-3">Receipt Footer</h5>

    <div class="mb-3">
      <label class="form-label">Default Receipt Message</label>
      <textarea id="receiptFooter" class="form-control" rows="3">Thank you for choosing EcoSamana Adventures. Adventure begins here.</textarea>
    </div>
<hr class="my-4">

<h5 class="fw-bold mb-3">
  Branding & Social Media
</h5>

<div class="row g-3">

  <div class="col-md-6">
    <label class="form-label">Company Logo</label>
    <input
      type="file"
      class="form-control"
      id="companyLogo"
      accept="image/*">
    <small class="text-muted">
      Logo used for tickets and receipts.
    </small>
  </div>

  <div class="col-md-6">
    <label class="form-label">Primary QR Code</label>
    <input
      type="file"
      class="form-control"
      id="companyQR"
      accept="image/*">
    <small class="text-muted">
      Appears on printed documents.
    </small>
  </div>

  <div class="col-md-6">
    <label class="form-label">Facebook</label>
    <input
      type="text"
      class="form-control"
      placeholder="https://facebook.com/eco.samana">
  </div>

  <div class="col-md-6">
    <label class="form-label">Instagram</label>
    <input
      type="text"
      class="form-control"
      placeholder="https://instagram.com/eco.samanadventures">
  </div>

  <div class="col-md-6">
    <label class="form-label">X (Twitter)</label>
    <input
      type="text"
      class="form-control"
      placeholder="https://x.com/Fiestaecosafari">
  </div>

  <div class="col-md-6">
    <label class="form-label">TikTok</label>
    <input
      type="text"
      class="form-control"
      placeholder="https://tiktok.com/@elinacalcano">
  </div>

</div>

<hr class="my-4">

<h5 class="fw-bold mb-3">
  Printing Preferences
</h5>

<div class="row g-3">

  <div class="col-md-4">
    <div class="form-check">
      <input
        class="form-check-input"
        type="checkbox"
        checked
        id="printLogo">
      <label class="form-check-label" for="printLogo">
        Print Logo
      </label>
    </div>
  </div>

  <div class="col-md-4">
    <div class="form-check">
      <input
        class="form-check-input"
        type="checkbox"
        checked
        id="printQR">
      <label class="form-check-label" for="printQR">
        Print QR Code
      </label>
    </div>
  </div>

  <div class="col-md-4">
    <div class="form-check">
      <input
        class="form-check-input"
        type="checkbox"
        checked
        id="printFooter">
      <label class="form-check-label" for="printFooter">
        Print Footer
      </label>
    </div>
  </div>

</div>
    <div class="d-flex justify-content-end gap-2 mt-4">
      <button type="button" class="btn btn-outline-secondary" id="resetSettingsBtn">
        Reset
      </button>

      <button type="submit" class="btn btn-success">
        Save Settings
      </button>
    </div>
  </form>
</div>
