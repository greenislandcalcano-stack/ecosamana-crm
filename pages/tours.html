<div class="crm-card">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-1">Tours Catalog</h3>
      <p class="text-muted mb-0">EcoSamana tour reference list for reservations.</p>
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-6">
      <input
        type="text"
        id="tourSearch"
        class="form-control"
        placeholder="Search by tour, location, price, or duration..."
      >
    </div>
  </div>

  <table class="table align-middle">
    <thead>
      <tr>
        <th>Tour</th>
        <th>Category</th>
        <th>Price</th>
        <th>Private</th>
        <th>Duration</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="toursTableBody"></tbody>
  </table>
</div>
